app_title: Carpentry Workbook Editors CMS

logo:
  src: ../img/favicon.ico
  show_in_header: true

logout_redirect_url: https://proq.global/

backend:
  name: github
  repo: proqglobal/carpentry-workbook
  branch: main
  base_url: https://sveltia-cms-auth.misty-bar-4bc7.workers.dev
auth_endpoint: /auth

# backend:
#   name: test-repo

local_backend: true

# Enable Editorial Workflow for PR-based editing
# publish_mode: editorial_workflow

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

singletons:
  - name: home
    label: Home Page
    file: content/home.yaml
    fields:
      - { label: Title, name: title }
      - { label: Body, name: body, widget: richtext }
    icon: home
  - name: settings
    label: Site Settings
    file: content/settings.yaml
    fields:
      - { label: Site Title, name: site_title }
      - { label: Description, name: description, widget: text }

collections:
  - name: "pages"
    label: "Workbook Pages"
    icon: auto_stories
    description: "This collection contains the pages that can be accessed using the **QR codes** in the carpentry workbook. Each page of the book is linked to a correpsonding page in this collection."
    folder: "content/pages"
    # body_field:
    #   key: content
    # index_file:
    #   label: "Workbook Home"
    #   icon: home
    #   fields: # Fields for the index file
    #     - { name: title, label: Title }
    #     - { name: body, label: Body, widget: richtext }
    identifier_field: page_number
    reorder:
      key: page_number
    create: false
    delete: false
    media_folder: ""
    public_folder: ""
    summary: "**{{page_number}}: {{title}}** | Status: {{status}}"
    view_filters:
      - { label: "Not Started", field: status, pattern: "empty" }
      - { label: "Work in Progress", field: status, pattern: "wip" }
      - { label: "Finished", field: status, pattern: "done" }
    fields:
      - { label: "Page ID", name: "id", widget: "hidden" }
      - {
          label: "Page Number",
          name: "page_number",
          widget: "hidden",
          required: false,
        }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Not started", value: "empty" }
          - { label: "Work in progress", value: "wip" }
          - { label: "Completed", value: "done" }
        default: "empty"
      - { label: "Page Title", name: "title", widget: "string" }

      # Media-First Component Baukasten
      - label: "Page Content"
        name: "content"
        widget: "list"
        summary: "{{fields.title}}"
        types:
          # 1. Text Component
          - label: "Text Section"
            name: "text"
            widget: "object"
            fields:
              - {
                  label: "Section Heading",
                  name: "title",
                  widget: "string",
                  required: false,
                }
              - { label: "Content Text", name: "content", widget: "richtext" }

          # 2. Video Component
          - label: "Video"
            name: "video"
            widget: "object"
            fields:
              - {
                  label: "Video File (MP4)",
                  name: "url",
                  widget: "image",
                  required: false,
                }
              - {
                  label: "Preview Image (Poster)",
                  name: "poster",
                  widget: "image",
                  required: false,
                }
              - {
                  label: "Caption / Description",
                  name: "caption",
                  widget: "string",
                  required: false,
                }

          # 3. Gallery Component
          - label: "Image(s)"
            name: "gallery"
            widget: "object"
            fields:
              - {
                  label: "Gallery Title",
                  name: "title",
                  widget: "string",
                  required: false,
                }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - label: "Image File"
                    name: "url"
                    widget: "image"
                    required: false
                  - {
                      label: "Image Caption",
                      name: "caption",
                      widget: "string",
                      required: false,
                    }

          # 4. PDF Download Component
          - label: "Document Download (PDF)"
            name: "pdf_download"
            widget: "object"
            fields:
              - {
                  label: "Title (e.g., Blueprint A4)",
                  name: "title",
                  widget: "string",
                }
              - { label: "File (PDF)", name: "url", widget: "file" }
              - {
                  label: "Description",
                  name: "description",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Size (e.g., 1.2 MB)",
                  name: "file_size",
                  widget: "string",
                  required: false,
                }

          # 5. Questionnaire (Quiz)
          - label: "❓ Questionnaire"
            name: "questionnaire"
            widget: "object"
            fields:
              - {
                  label: "Questionnaire Title",
                  name: "title",
                  widget: "string",
                  default: "Knowledge Check",
                }
              - label: "Questions"
                name: "questions"
                widget: "list"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Option A", name: "option_a", widget: "string" }
                  - { label: "Option B", name: "option_b", widget: "string" }
                  - {
                      label: "Option C",
                      name: "option_c",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Option D",
                      name: "option_d",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Correct Option",
                      name: "correct",
                      widget: "select",
                      options: ["A", "B", "C", "D"],
                      multiple: true,
                    }
                  - {
                      label: "Explanation for Feedback",
                      name: "explanation",
                      widget: "string",
                      required: false,
                    }
