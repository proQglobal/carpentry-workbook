<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
</head>
<body>
    <header>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
    </header>
    <main>
        <article>
            <h2>{{ .Title }}</h2>
            <p><small>{{ .Date.Format "January 2, 2006" }}</small></p>
            {{ .Content }}
        </article>
    </main>
</body>
</html>
