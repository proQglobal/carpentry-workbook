<!DOCTYPE html>
<html lang="en-us">
<head><script src="/carpentry-workbook/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=carpentry-workbook/livereload" data-no-instant defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Example Post | proQ Carpentry workbook</title>
    
    <link rel="stylesheet" href="http://localhost:1313/carpentry-workbook/css/main.min.css">
</head>
<body>
    <div class="container">
        <h1>proQ Carpentry workbook</h1>
        <h2>First Example Post</h2>

        

        <div class="nav-bar">
            
                <a class="nav-btn" href="/carpentry-workbook/page000/">← Previous Page</a>
            
            <a class="nav-btn nav-dashboard" id="back-to-dashboard" href="#">Dashboard</a>
            
                <a class="nav-btn disabled">Next Page →</a>
            
        </div>
    </div>

    <script>
            window.addEventListener('load', function() {
                var dashboardLink = document.getElementById('back-to-dashboard');
                if (dashboardLink) {
                    if (window.location.pathname.includes('/content/html/')) {
                        dashboardLink.href = '../../dashboard/index.html';
                    } else if (window.location.pathname.includes('/preview/')) {
                        dashboardLink.href = '../dashboard/index.html';
                    } else {
                        
                        dashboardLink.href = 'index.html';
                    }
                }
            });

            function handleOptionClick(button, selectedLetter, quizIdx) {
                var card = document.getElementById('quiz-block-' + quizIdx);
                var correctAttr = card.getAttribute('data-correct');
                var correctLetters;
                try { correctLetters = JSON.parse(correctAttr); } catch (e) { correctLetters = correctAttr; }

                
                if (Array.isArray(correctLetters) && correctLetters.length > 1) {
                    toggleSelect(button);
                    return;
                }

                
                checkAnswer(button, selectedLetter, quizIdx);
            }

            function toggleSelect(button) {
                if (button.classList.contains('selected')) {
                    button.classList.remove('selected');
                } else {
                    button.classList.add('selected');
                }
            }

            function submitAnswers(quizIdx) {
                var card = document.getElementById('quiz-block-' + quizIdx);
                var buttons = card.getElementsByClassName('quiz-btn');
                var feedback = document.getElementById('feedback-' + quizIdx);
                var explanation = card.getAttribute('data-explanation');
                var correctAttr = card.getAttribute('data-correct');
                var correctLetters;
                try { correctLetters = JSON.parse(correctAttr); } catch (e) { correctLetters = correctAttr; }

                var selected = [];
                for (var i = 0; i < buttons.length; i++) {
                    var btn = buttons[i];
                    if (btn.classList.contains('selected')) {
                        
                        var text = btn.innerText.trim();
                        var letter = text.charAt(0);
                        selected.push(letter);
                    }
                }

                
                for (var i = 0; i < buttons.length; i++) {
                    buttons[i].disabled = true;
                    buttons[i].style.opacity = "0.6";
                    buttons[i].style.cursor = "default";
                }

                feedback.style.display = "block";

                
                var isCorrect = false;
                if (!Array.isArray(correctLetters)) {
                    isCorrect = (selected.length === 1 && selected[0] === correctLetters);
                } else {
                    if (selected.length === correctLetters.length) {
                        
                        isCorrect = correctLetters.every(function (c) { return selected.indexOf(c) !== -1; });
                    }
                }

                if (isCorrect) {
                    feedback.innerHTML = "&#10004; Correct! " + explanation;
                    feedback.style.backgroundColor = "#e8f5e9";
                    feedback.style.color = "#1b5e20";
                    
                    for (var i = 0; i < buttons.length; i++) {
                        if (buttons[i].classList.contains('selected')) {
                            buttons[i].style.backgroundColor = "#c8e6c9";
                            buttons[i].style.borderColor = "#81c784";
                            buttons[i].style.color = "#1b5e20";
                            buttons[i].style.opacity = "1";
                        }
                    }
                } else {
                    feedback.innerHTML = "&#10008; Incorrect. The correct answer is " + (Array.isArray(correctLetters) ? correctLetters.join(',') : correctLetters) + ". " + explanation;
                    feedback.style.backgroundColor = "#ffebee";
                    feedback.style.color = "#b71c1c";
                    
                    for (var j = 0; j < buttons.length; j++) {
                        var btnText = buttons[j].innerText.trim();
                        var letter = btnText.charAt(0);
                        if (Array.isArray(correctLetters)) {
                            if (correctLetters.indexOf(letter) !== -1) {
                                buttons[j].style.borderColor = "#81c784";
                                buttons[j].style.backgroundColor = "#e8f5e9";
                                buttons[j].style.color = "#1b5e20";
                                buttons[j].style.opacity = "1";
                            }
                        } else {
                            if (letter === correctLetters) {
                                buttons[j].style.borderColor = "#81c784";
                                buttons[j].style.backgroundColor = "#e8f5e9";
                                buttons[j].style.color = "#1b5e20";
                                buttons[j].style.opacity = "1";
                            }
                        }
                    }
                }
            }

            function checkAnswer(button, selectedLetter, quizIdx) {
                var card = document.getElementById('quiz-block-' + quizIdx);
                var buttons = card.getElementsByClassName('quiz-btn');
                var feedback = document.getElementById('feedback-' + quizIdx);
                var explanation = card.getAttribute('data-explanation');
                var correctAttr = card.getAttribute('data-correct');
                var correctLetters;
                try { correctLetters = JSON.parse(correctAttr); } catch (e) { correctLetters = correctAttr; }

                for (var i = 0; i < buttons.length; i++) {
                    buttons[i].disabled = true;
                    buttons[i].style.opacity = "0.6";
                    buttons[i].style.cursor = "default";
                }
                feedback.style.display = "block";

                var isCorrect = (!Array.isArray(correctLetters) && selectedLetter === correctLetters) || (Array.isArray(correctLetters) && correctLetters.indexOf(selectedLetter) !== -1);

                if (isCorrect) {
                    button.style.backgroundColor = "#c8e6c9";
                    button.style.borderColor = "#81c784";
                    button.style.color = "#1b5e20";
                    button.style.opacity = "1";
                    feedback.innerHTML = "&#10004; Correct! " + explanation;
                    feedback.style.backgroundColor = "#e8f5e9";
                    feedback.style.color = "#1b5e20";
                } else {
                    button.style.backgroundColor = "#ffcdd2";
                    button.style.borderColor = "#e57373";
                    button.style.color = "#b71c1c";
                    button.style.opacity = "1";
                    var correctDisplay = Array.isArray(correctLetters) ? correctLetters.join(',') : correctLetters;
                    feedback.innerHTML = "&#10008; Incorrect. The correct answer is " + correctDisplay + ". " + explanation;
                    feedback.style.backgroundColor = "#ffebee";
                    feedback.style.color = "#b71c1c";
                    for (var j = 0; j < buttons.length; j++) {
                        var btnText = buttons[j].innerText.trim();
                        if (Array.isArray(correctLetters)) {
                            for (var k = 0; k < correctLetters.length; k++) {
                                if (btnText.indexOf(correctLetters[k] + ')') === 0) {
                                    buttons[j].style.borderColor = "#81c784";
                                    buttons[j].style.backgroundColor = "#e8f5e9";
                                    buttons[j].style.color = "#1b5e20";
                                    buttons[j].style.opacity = "1";
                                }
                            }
                        } else {
                            if (btnText.indexOf(correctLetters + ')') === 0) {
                                buttons[j].style.borderColor = "#81c784";
                                buttons[j].style.backgroundColor = "#e8f5e9";
                                buttons[j].style.color = "#1b5e20";
                                buttons[j].style.opacity = "1";
                            }
                        }
                    }
                }
            }
    </script>
</body>
</html>
