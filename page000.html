<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Wood Workbench + Ring</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fdfbf7;
            color: #2c2520;
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: block;
        }

        h1 {
            color: #5c4033;
            font-size: 1.6em;
            border-bottom: 3px solid #8b5a2b;
            padding-bottom: 6px;
            margin: 10px 0 20px 0;
        }

        h2 {
            color: #5c4033;
            font-size: 1.3em;
            margin: 25px 0 10px 0;
        }

        h3 {
            color: #8b5a2b;
            font-size: 1.1em;
            margin: 20px 0 8px 0;
        }

        p {
            margin: 0 0 14px 0;
            font-size: 1.0em;
        }

        /* Components */
        .video-block {
            margin: 20px 0;
            background: #000;
            border-radius: 6px;
            display: block;
            width: 100%;
        }

        .video-block video {
            display: block;
            width: 100%;
            height: auto;
            max-height: 340px;
        }

        .gallery-block {
            margin: 20px 0;
            display: block;
            width: 100%;
        }

        .gallery-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .gallery-item {
            background: #ffffff;
            border: 1px solid #eae3d8;
            border-radius: 4px;
            padding: 6px;
            margin-bottom: 15px;
            display: block;
        }

        .gallery-item img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 2px;
        }

        .media-caption {
            font-size: 0.85em;
            color: #61554d;
            padding: 6px 8px 2px 8px;
            margin: 0;
            font-style: italic;
        }

        .download-block {
            background-color: #f0f4f8;
            border: 1px solid #d0daf0;
            border-radius: 6px;
            padding: 14px;
            margin: 20px 0;
            display: block;
        }

        .download-heading {
            display: block;
            font-size: 1.05em;
            color: #1a365d;
            margin-bottom: 4px;
        }

        .download-desc {
            font-size: 0.9em;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .file-info {
            font-size: 0.8em;
            color: #718096;
            display: block;
            margin-bottom: 10px;
        }

        .download-button {
            display: block;
            text-align: center;
            background-color: #0056b3;
            color: #ffffff;
            text-decoration: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        .quiz-section {
            margin: 30px 0;
            display: block;
        }

        .quiz-block {
            background: #ffffff;
            border: 1px solid #dcd1c4;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 15px;
            display: block;
        }

        .quiz-question {
            font-weight: bold;
            margin-bottom: 12px;
        }

        .quiz-btn {
            display: block;
            width: 100%;
            text-align: left;
            background-color: #fdfbf7;
            border: 1px solid #eae3d8;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: #2c2520;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .quiz-btn.selected {
            background-color: #e3f2fd;
            border-color: #90caf9;
            color: #0b3d91;
        }

        .quiz-submit {
            display: block;
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            background-color: #1976d2;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .quiz-feedback {
            display: none;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: bold;
            line-height: 1.4;
        }

        /* Navigation Bar */
        .nav-bar {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eae3d8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            display: inline-block;
            padding: 10px 16px;
            background-color: #8b5a2b;
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.9em;
            transition: background-color 0.2s;
        }

        .nav-btn:hover {
            background-color: #5c4033;
        }

        .nav-btn.disabled {
            background-color: #eae3d8;
            color: #a89f95;
            cursor: not-allowed;
            pointer-events: none;
        }

        .nav-btn.nav-dashboard {
            background-color: transparent;
            color: #8b5a2b;
            border: 1px solid #8b5a2b;
        }

        .nav-btn.nav-dashboard:hover {
            background-color: #eae3d8;
            color: #5c4033;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Wood Workbench + Ring</h1>
        <h2>Introduction</h2>
<div class='text-content'>

<div class='gallery-block'>

  <div class='gallery-item'>

  </div>
</div>
<div class='quiz-section'>
  <h3>Knowledge Check</h3>
  <div class='quiz-block' id='quiz-block-1' data-explanation='All of the above' data-correct='["A", "B", "C"]'>
    <p class='quiz-question'>What is pi?</p>
    <button class='quiz-btn' onclick="handleOptionClick(this, 'A', 1)">A) A number</button>
    <button class='quiz-btn' onclick="handleOptionClick(this, 'B', 1)">B) Something delicious</button>
    <button class='quiz-btn' onclick="handleOptionClick(this, 'C', 1)">C) A tiger</button>
    <button class='quiz-submit' onclick="submitAnswers(1)">Check Answers</button>
    <div class='quiz-feedback' id='feedback-1'></div>
  </div>
</div>

        <div class="nav-bar">
            <a class="nav-btn disabled">← Previous Page</a>
            <a class="nav-btn nav-dashboard" id="back-to-dashboard" href="#">Dashboard</a>
            <a class="nav-btn disabled">Next Page →</a>
        </div>
    </div>

    <script>
            window.addEventListener('load', function() {
                var dashboardLink = document.getElementById('back-to-dashboard');
                if (dashboardLink) {
                    if (window.location.pathname.includes('/content/html/')) {
                        dashboardLink.href = '../../dashboard/index.html';
                    } else if (window.location.pathname.includes('/preview/')) {
                        dashboardLink.href = '../dashboard/index.html';
                    } else {
                        // GitHub Pages or offline package served from root
                        dashboardLink.href = 'index.html';
                    }
                }
            });

            function handleOptionClick(button, selectedLetter, quizIdx) {
                var card = document.getElementById('quiz-block-' + quizIdx);
                var correctAttr = card.getAttribute('data-correct');
                var correctLetters;
                try { correctLetters = JSON.parse(correctAttr); } catch (e) { correctLetters = correctAttr; }

                // Multi-answer when correctLetters is an array with length > 1
                if (Array.isArray(correctLetters) && correctLetters.length > 1) {
                    toggleSelect(button);
                    return;
                }

                // Single-answer behaviour
                checkAnswer(button, selectedLetter, quizIdx);
            }

            function toggleSelect(button) {
                if (button.classList.contains('selected')) {
                    button.classList.remove('selected');
                } else {
                    button.classList.add('selected');
                }
            }

            function submitAnswers(quizIdx) {
                var card = document.getElementById('quiz-block-' + quizIdx);
                var buttons = card.getElementsByClassName('quiz-btn');
                var feedback = document.getElementById('feedback-' + quizIdx);
                var explanation = card.getAttribute('data-explanation');
                var correctAttr = card.getAttribute('data-correct');
                var correctLetters;
                try { correctLetters = JSON.parse(correctAttr); } catch (e) { correctLetters = correctAttr; }

                var selected = [];
                for (var i = 0; i < buttons.length; i++) {
                    var btn = buttons[i];
                    if (btn.classList.contains('selected')) {
                        // letter is before the ')'
                        var text = btn.innerText.trim();
                        var letter = text.charAt(0);
                        selected.push(letter);
                    }
                }

                // disable all buttons after submission
                for (var i = 0; i < buttons.length; i++) {
                    buttons[i].disabled = true;
                    buttons[i].style.opacity = "0.6";
                    buttons[i].style.cursor = "default";
                }

                feedback.style.display = "block";

                // compare sets: selected must match correctLetters (order doesn't matter)
                var isCorrect = false;
                if (!Array.isArray(correctLetters)) {
                    isCorrect = (selected.length === 1 && selected[0] === correctLetters);
                } else {
                    if (selected.length === correctLetters.length) {
                        // check every correct letter is in selected
                        isCorrect = correctLetters.every(function (c) { return selected.indexOf(c) !== -1; });
                    }
                }

                if (isCorrect) {
                    feedback.innerHTML = "&#10004; Correct! " + explanation;
                    feedback.style.backgroundColor = "#e8f5e9";
                    feedback.style.color = "#1b5e20";
                    // highlight selected answers
                    for (var i = 0; i < buttons.length; i++) {
                        if (buttons[i].classList.contains('selected')) {
                            buttons[i].style.backgroundColor = "#c8e6c9";
                            buttons[i].style.borderColor = "#81c784";
                            buttons[i].style.color = "#1b5e20";
                            buttons[i].style.opacity = "1";
                        }
                    }
                } else {
                    feedback.innerHTML = "&#10008; Incorrect. The correct answer is " + (Array.isArray(correctLetters) ? correctLetters.join(',') : correctLetters) + ". " + explanation;
                    feedback.style.backgroundColor = "#ffebee";
                    feedback.style.color = "#b71c1c";
                    // highlight correct answers
                    for (var j = 0; j < buttons.length; j++) {
                        var btnText = buttons[j].innerText.trim();
                        var letter = btnText.charAt(0);
                        if (Array.isArray(correctLetters)) {
                            if (correctLetters.indexOf(letter) !== -1) {
                                buttons[j].style.borderColor = "#81c784";
                                buttons[j].style.backgroundColor = "#e8f5e9";
                                buttons[j].style.color = "#1b5e20";
                                buttons[j].style.opacity = "1";
                            }
                        } else {
                            if (letter === correctLetters) {
                                buttons[j].style.borderColor = "#81c784";
                                buttons[j].style.backgroundColor = "#e8f5e9";
                                buttons[j].style.color = "#1b5e20";
                                buttons[j].style.opacity = "1";
                            }
                        }
                    }
                }
            }

            function checkAnswer(button, selectedLetter, quizIdx) {
                var card = document.getElementById('quiz-block-' + quizIdx);
                var buttons = card.getElementsByClassName('quiz-btn');
                var feedback = document.getElementById('feedback-' + quizIdx);
                var explanation = card.getAttribute('data-explanation');
                var correctAttr = card.getAttribute('data-correct');
                var correctLetters;
                try { correctLetters = JSON.parse(correctAttr); } catch (e) { correctLetters = correctAttr; }

                for (var i = 0; i < buttons.length; i++) {
                    buttons[i].disabled = true;
                    buttons[i].style.opacity = "0.6";
                    buttons[i].style.cursor = "default";
                }
                feedback.style.display = "block";

                var isCorrect = (!Array.isArray(correctLetters) && selectedLetter === correctLetters) || (Array.isArray(correctLetters) && correctLetters.indexOf(selectedLetter) !== -1);

                if (isCorrect) {
                    button.style.backgroundColor = "#c8e6c9";
                    button.style.borderColor = "#81c784";
                    button.style.color = "#1b5e20";
                    button.style.opacity = "1";
                    feedback.innerHTML = "&#10004; Correct! " + explanation;
                    feedback.style.backgroundColor = "#e8f5e9";
                    feedback.style.color = "#1b5e20";
                } else {
                    button.style.backgroundColor = "#ffcdd2";
                    button.style.borderColor = "#e57373";
                    button.style.color = "#b71c1c";
                    button.style.opacity = "1";
                    var correctDisplay = Array.isArray(correctLetters) ? correctLetters.join(',') : correctLetters;
                    feedback.innerHTML = "&#10008; Incorrect. The correct answer is " + correctDisplay + ". " + explanation;
                    feedback.style.backgroundColor = "#ffebee";
                    feedback.style.color = "#b71c1c";
                    for (var j = 0; j < buttons.length; j++) {
                        var btnText = buttons[j].innerText.trim();
                        if (Array.isArray(correctLetters)) {
                            for (var k = 0; k < correctLetters.length; k++) {
                                if (btnText.indexOf(correctLetters[k] + ')') === 0) {
                                    buttons[j].style.borderColor = "#81c784";
                                    buttons[j].style.backgroundColor = "#e8f5e9";
                                    buttons[j].style.color = "#1b5e20";
                                    buttons[j].style.opacity = "1";
                                }
                            }
                        } else {
                            if (btnText.indexOf(correctLetters + ')') === 0) {
                                buttons[j].style.borderColor = "#81c784";
                                buttons[j].style.backgroundColor = "#e8f5e9";
                                buttons[j].style.color = "#1b5e20";
                                buttons[j].style.opacity = "1";
                            }
                        }
                    }
                }
            }
    </script>
</body>

</html>
