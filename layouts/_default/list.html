<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
</head>
<body>
    <header>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
    </header>
    <main>
        <h2>{{ .Title }}</h2>
        <ul>
            {{ range .Pages }}
            <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a> - {{ .Date.Format "2006-01-02" }}
            </li>
            {{ end }}
        </ul>
    </main>
</body>
</html>
